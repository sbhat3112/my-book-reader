<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyBooks</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8;--surface:#fffdf8;--surface2:#f0ebe0;
  --accent:#c8602a;--accent2:#2a6cb5;
  --text:#1a1410;--text2:#6b5e4e;
  --border:#d9cfc0;--shadow:rgba(0,0,0,0.10);--radius:14px;
  --page-bg:#faf8f3;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--text);}

/* AUTH */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:28px;padding:40px 20px;}
.auth-logo{font-family:'Playfair Display',serif;font-size:2.8rem;color:var(--accent);}
.auth-logo span{color:var(--text);}
.auth-sub{color:var(--text2);font-size:1rem;text-align:center;max-width:320px;line-height:1.6;}
.btn-google{display:flex;align-items:center;gap:12px;background:white;border:1.5px solid var(--border);padding:14px 28px;border-radius:50px;font-family:'Lato',sans-serif;font-size:1rem;font-weight:700;color:var(--text);cursor:pointer;box-shadow:0 2px 12px var(--shadow);transition:all 0.2s;}
.btn-google:hover{box-shadow:0 6px 24px var(--shadow);transform:translateY(-2px);}
.btn-google svg{width:22px;height:22px;}

/* LIBRARY */
#app{display:none;flex-direction:column;height:100vh;overflow:hidden;}
nav{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;flex-shrink:0;box-shadow:0 2px 10px var(--shadow);}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.45rem;color:var(--accent);}
.nav-actions{display:flex;align-items:center;gap:12px;}
.btn{font-family:'Lato',sans-serif;font-weight:700;font-size:0.88rem;padding:8px 18px;border-radius:50px;border:none;cursor:pointer;transition:all 0.18s;}
.btn-primary{background:var(--accent);color:white;}
.btn-primary:hover{background:#b05020;}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent2);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.9rem;cursor:pointer;}
#library{flex:1;overflow-y:auto;padding:28px 28px 60px;}
.library-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:14px;}
.library-title{font-family:'Playfair Display',serif;font-size:1.9rem;color:var(--text);}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:50px;padding:7px 16px;width:260px;}
.search-bar input{border:none;background:transparent;font-family:'Lato',sans-serif;font-size:0.9rem;color:var(--text);outline:none;width:100%;}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;margin-bottom:28px;cursor:pointer;transition:all 0.2s;background:var(--surface);}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:#fdf5ee;}
.upload-zone p{color:var(--text2);font-size:0.9rem;}
.upload-zone .icon{font-size:2.2rem;margin-bottom:8px;}
#file-input{display:none;}
.books-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:22px;}
.book-card{cursor:pointer;border-radius:var(--radius);overflow:hidden;background:var(--surface);box-shadow:0 2px 10px var(--shadow);transition:all 0.22s;}
.book-card:hover{transform:translateY(-5px);box-shadow:0 10px 28px var(--shadow);}
.book-cover{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:0.95rem;font-style:italic;padding:16px;text-align:center;line-height:1.3;color:white;position:relative;overflow:hidden;}
.book-cover::after{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;background:rgba(0,0,0,0.18);}
.book-info{padding:10px 12px 12px;}
.book-title{font-weight:700;font-size:0.84rem;color:var(--text);line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.book-type{font-size:0.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}
.progress-bar-wrap{margin-top:7px;background:var(--surface2);border-radius:4px;height:3px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.4s;}
.progress-label{font-size:0.7rem;color:var(--text2);margin-top:3px;}
.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text2);}
.empty-state .icon{font-size:3.5rem;margin-bottom:14px;}
.empty-state p{font-size:1rem;margin-bottom:18px;}

/* READER */
#reader-screen{display:none;position:fixed;inset:0;z-index:500;background:var(--page-bg);overflow:hidden;}

/* Page viewport */
#page-viewport{position:absolute;inset:0;overflow:hidden;cursor:pointer;}

/* Page canvas slides */
#page-canvas{position:absolute;top:0;left:0;bottom:0;display:flex;will-change:transform;}
.spread{flex-shrink:0;display:flex;position:relative;}
.page{overflow:hidden;position:relative;background:var(--page-bg);}
.page-inner{
  position:absolute;inset:0;overflow:hidden;
  font-family:Georgia,'Times New Roman',serif;
  line-height:1.85;color:#1e1810;
}
.page-inner p{margin:0 0 0.85em;}
.page-inner h1,.page-inner h2,.page-inner h3{font-family:'Playfair Display',serif;margin:1.2em 0 0.5em;line-height:1.2;}
.page-inner h1{font-size:1.6em;}
.page-inner h2{font-size:1.25em;}
.page-inner h3{font-size:1.05em;}
.page-inner img{max-width:100%;display:block;margin:12px auto;}
.page-inner a{color:inherit;text-decoration:none;pointer-events:none;}
.page-inner blockquote{border-left:3px solid var(--accent);margin:14px 0;padding:2px 14px;color:var(--text2);font-style:italic;}
.page-inner ol,.page-inner ul{margin:0.5em 0 0.85em 1.4em;}

/* Center divider */
#page-divider{display:none;position:absolute;top:32px;bottom:32px;left:50%;width:1px;background:var(--border);opacity:0.45;z-index:10;pointer-events:none;}

/* Page number pill */
#page-pill{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(30,24,16,0.4);color:white;font-size:0.7rem;padding:3px 12px;border-radius:20px;pointer-events:none;z-index:50;font-family:'Lato',sans-serif;white-space:nowrap;}

/* Tap zones */
#tap-left,#tap-right,#tap-center{position:absolute;top:0;bottom:0;z-index:60;opacity:0;cursor:pointer;}
#tap-left{left:0;width:25%;}
#tap-right{right:0;width:25%;}
#tap-center{left:25%;right:25%;}

/* Arrows */
.pg-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:80;width:40px;height:40px;background:rgba(245,240,232,0.9);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;color:var(--text2);box-shadow:0 2px 8px var(--shadow);opacity:0;transition:opacity 0.2s;pointer-events:none;}
#page-viewport:hover .pg-arrow{opacity:1;pointer-events:all;}
#pg-prev{left:10px;}
#pg-next{right:10px;}

/* Chrome top */
#chrome-top{position:absolute;top:0;left:0;right:0;z-index:100;background:rgba(250,248,243,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;transform:translateY(-100%);transition:transform 0.25s ease;pointer-events:none;}
#chrome-top.show{transform:translateY(0);pointer-events:all;}
.back-btn{background:none;border:none;cursor:pointer;color:var(--accent);font-size:0.9rem;font-family:'Lato',sans-serif;font-weight:700;padding:6px 0;}
.chrome-title{font-family:'Playfair Display',serif;font-size:0.87rem;color:var(--text);max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chrome-controls{display:flex;gap:6px;}
.ctrl-btn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:30px;height:30px;cursor:pointer;font-size:0.78rem;font-weight:700;font-family:'Lato',sans-serif;display:flex;align-items:center;justify-content:center;color:var(--text);transition:background 0.15s;}
.ctrl-btn:hover{background:var(--border);}

/* Chrome bottom */
#chrome-bottom{position:absolute;bottom:0;left:0;right:0;z-index:100;background:rgba(250,248,243,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:10px 20px 14px;transform:translateY(100%);transition:transform 0.25s ease;pointer-events:none;}
#chrome-bottom.show{transform:translateY(0);pointer-events:all;}
.scrubber-row{display:flex;align-items:center;gap:14px;}
.scrubber{flex:1;height:20px;display:flex;align-items:center;cursor:pointer;}
.scrubber-track{flex:1;height:3px;background:var(--border);border-radius:3px;overflow:hidden;}
.scrubber-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.3s;pointer-events:none;}
.scrubber-label{font-size:0.72rem;color:var(--text2);white-space:nowrap;min-width:60px;text-align:right;font-family:'Lato',sans-serif;}

/* PDF */
#pdf-area{display:none;position:absolute;inset:0;background:#2a2620;align-items:center;justify-content:center;overflow:hidden;}
#pdf-area canvas{max-width:100%;max-height:100%;object-fit:contain;box-shadow:0 4px 40px rgba(0,0,0,0.5);}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:100%;color:var(--text2);font-family:'Lato',sans-serif;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Toast */
#toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:white;padding:9px 20px;border-radius:50px;font-size:0.84rem;opacity:0;transition:all 0.28s;z-index:9999;pointer-events:none;font-family:'Lato',sans-serif;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Hidden measurement */
#measure-div{position:fixed;left:-9999px;top:0;visibility:hidden;pointer-events:none;}

@media(max-width:640px){
  nav{padding:0 14px;}
  #library{padding:18px 14px 60px;}
  .library-title{font-size:1.5rem;}
  .books-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px;}
  .search-bar{width:100%;}
  .library-header{flex-direction:column;align-items:flex-start;}
  .pg-arrow{display:none;}
}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">📚 <span>My</span>Books</div>
  <div class="auth-sub">Your personal library — stored in Google Drive, readable anywhere.</div>
  <button class="btn-google" onclick="signIn()">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </button>
</div>

<!-- LIBRARY -->
<div id="app">
  <nav>
    <div class="nav-logo">📚 MyBooks</div>
    <div class="nav-actions">
      <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">+ Upload</button>
      <div class="avatar" id="user-avatar" title="Sign out" onclick="signOut()">?</div>
    </div>
  </nav>
  <div id="library">
    <div class="library-header">
      <div class="library-title">My Library</div>
      <div class="search-bar"><span>🔍</span><input type="text" placeholder="Search books…" id="search-input" oninput="filterBooks()"></div>
    </div>
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📂</div>
      <p><strong>Click to upload</strong> or drag & drop</p>
      <p style="font-size:0.8rem;margin-top:5px;">EPUB and PDF supported</p>
    </div>
    <input type="file" id="file-input" accept=".epub,.pdf" multiple onchange="uploadBooks(event)">
    <div class="books-grid" id="books-grid">
      <div class="empty-state"><div class="icon">📖</div><p>Loading your library…</p></div>
    </div>
  </div>
</div>

<!-- READER -->
<div id="reader-screen">
  <div id="page-viewport">
    <div id="page-canvas"></div>
    <div id="page-divider"></div>
    <div id="tap-left" onclick="prevPage()"></div>
    <div id="tap-center" onclick="toggleChrome()"></div>
    <div id="tap-right" onclick="nextPage()"></div>
    <div class="pg-arrow" id="pg-prev" onclick="prevPage()">‹</div>
    <div class="pg-arrow" id="pg-next" onclick="nextPage()">›</div>
    <div id="page-pill">–</div>
  </div>
  <div id="pdf-area"></div>
  <div id="chrome-top">
    <button class="back-btn" onclick="closeReader()">← Library</button>
    <div class="chrome-title" id="chrome-title">Book</div>
    <div class="chrome-controls">
      <button class="ctrl-btn" onclick="changeFontSize(-1)">A-</button>
      <button class="ctrl-btn" onclick="changeFontSize(1)">A+</button>
    </div>
  </div>
  <div id="chrome-bottom">
    <div class="scrubber-row">
      <div class="scrubber" onclick="scrubberClick(event)">
        <div class="scrubber-track"><div class="scrubber-fill" id="scrubber-fill" style="width:0%"></div></div>
      </div>
      <div class="scrubber-label" id="scrubber-label">–</div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="measure-div"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const CLIENT_ID = '101355831458-ecb4pgkana89anjh9u1q9vg1fbemv76q.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const FOLDER_NAME = 'MyBooksApp';
const PROGRESS_FILE = 'mybooksapp_progress.json';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ───────────────────────────────────────────────────
let accessToken = null, folderId = null;
let allBooks = [], progress = {}, currentBook = null;
let pdfDoc = null, pdfCurrentPage = 1, fontSize = 18;
let pages = [], currentSpread = 0, totalSpreads = 0, isMobile = false;
let chromeVisible = false, chromeTimer = null;
let epubRawHtml = '';

const COVERS = [['#c8602a','#e8905a'],['#2a6cb5','#5a9ce8'],['#2a8c5a','#5ab87a'],['#7a2a8c','#b05ac0'],['#8c6a2a','#c0a05a'],['#2a7a8c','#5ab0c0'],['#8c2a4a','#c05a7a'],['#4a6a2a','#7ab05a']];

// ── AUTH ────────────────────────────────────────────────────
function signIn() {
  const params = new URLSearchParams({client_id:CLIENT_ID,redirect_uri:'https://sbhat3112.github.io/my-book-reader/callback.html',response_type:'token',scope:SCOPES,prompt:'select_account'});
  const popup = window.open(`https://accounts.google.com/o/oauth2/v2/auth?${params}`,'ga',`width=500,height=600,left=${(screen.width-500)/2},top=${(screen.height-600)/2}`);
  const t = setInterval(async()=>{
    try{
      if(popup.closed){clearInterval(t);return;}
      const url=popup.location.href;
      if(url.includes('access_token')){
        clearInterval(t);popup.close();
        const p=new URLSearchParams(url.split('#')[1]);
        accessToken=p.get('access_token');
        localStorage.setItem('books_token',JSON.stringify({token:accessToken,expiry:Date.now()+parseInt(p.get('expires_in')||3600)*1000}));
        await onSignedIn();
      }
    }catch(e){}
  },500);
}
function signOut(){if(!confirm('Sign out?'))return;accessToken=null;localStorage.removeItem('books_token');document.getElementById('auth-screen').style.display='flex';document.getElementById('app').style.display='none';}
function loadSavedToken(){try{const s=localStorage.getItem('books_token');if(!s)return false;const{token,expiry}=JSON.parse(s);if(Date.now()>expiry){localStorage.removeItem('books_token');return false;}accessToken=token;return true;}catch{return false;}}
async function verifyToken(){try{const d=await(await fetch('https://www.googleapis.com/oauth2/v3/tokeninfo?access_token='+accessToken)).json();if(d.error){localStorage.removeItem('books_token');return false;}document.getElementById('user-avatar').textContent=(d.email||'?')[0].toUpperCase();return true;}catch{return false;}}
async function onSignedIn(){if(!await verifyToken()){showToast('Auth failed');return;}document.getElementById('auth-screen').style.display='none';document.getElementById('app').style.display='flex';folderId=await getOrCreateFolder();await refreshLibrary();initDragDrop();}

// ── DRIVE ───────────────────────────────────────────────────
async function driveApi(path,opts={}){const r=await fetch('https://www.googleapis.com/drive/v3/'+path,{...opts,headers:{Authorization:'Bearer '+accessToken,...(opts.headers||{})}});if(r.status===401){localStorage.removeItem('books_token');location.reload();}return r;}
async function getOrCreateFolder(){const d=await(await driveApi(`files?q=name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id)`)).json();if(d.files?.length)return d.files[0].id;return(await(await driveApi('files',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:FOLDER_NAME,mimeType:'application/vnd.google-apps.folder'})})).json()).id;}
async function listBooks(){return(await(await driveApi(`files?q='${folderId}' in parents and trashed=false and (name contains '.epub' or name contains '.pdf')&fields=files(id,name,size,modifiedTime)&orderBy=name`)).json()).files||[];}
async function loadProgress(){const d=await(await driveApi(`files?q='${folderId}' in parents and name='${PROGRESS_FILE}' and trashed=false&fields=files(id)`)).json();if(!d.files?.length)return{};try{return await(await driveApi(`files/${d.files[0].id}?alt=media`)).json();}catch{return{};}}
async function saveProgress(){
  const d=await(await driveApi(`files?q='${folderId}' in parents and name='${PROGRESS_FILE}' and trashed=false&fields=files(id)`)).json();
  const blob=new Blob([JSON.stringify(progress)],{type:'application/json'});
  const form=new FormData();
  form.append('metadata',new Blob([JSON.stringify({name:PROGRESS_FILE,...(d.files?.length?{}:{parents:[folderId]})})],{type:'application/json'}));
  form.append('file',blob);
  await fetch(d.files?.length?`https://www.googleapis.com/upload/drive/v3/files/${d.files[0].id}?uploadType=multipart`:'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:d.files?.length?'PATCH':'POST',headers:{Authorization:'Bearer '+accessToken},body:form});
}
async function downloadFile(id){return(await driveApi(`files/${id}?alt=media`)).arrayBuffer();}

// ── UPLOAD ──────────────────────────────────────────────────
async function uploadBooks(e){
  const files=Array.from(e.target.files);if(!files.length)return;
  showToast(`Uploading ${files.length} book(s)…`);
  for(const f of files){const form=new FormData();form.append('metadata',new Blob([JSON.stringify({name:f.name,parents:[folderId]})],{type:'application/json'}));form.append('file',f);await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+accessToken},body:form});}
  showToast('Upload complete!');await refreshLibrary();e.target.value='';
}

// ── LIBRARY ─────────────────────────────────────────────────
function getCoverColor(n){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))%COVERS.length;return COVERS[Math.abs(h)];}
function renderBooks(list){
  const g=document.getElementById('books-grid');
  if(!list.length){g.innerHTML=`<div class="empty-state"><div class="icon">📚</div><p>No books yet. Upload your first!</p></div>`;return;}
  g.innerHTML=list.map(b=>{
    const[c1,c2]=getCoverColor(b.name),clean=b.name.replace(/\.(epub|pdf)$/i,''),ext=b.name.split('.').pop().toUpperCase(),pct=(progress[b.id]?.percent)||0;
    return`<div class="book-card" onclick="openBook('${b.id}','${ext}','${clean.replace(/'/g,"\\'")}')"><div class="book-cover" style="background:linear-gradient(135deg,${c1},${c2})">${clean}</div><div class="book-info"><div class="book-title" title="${clean}">${clean}</div><div class="book-type">${ext}</div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div><div class="progress-label">${pct>0?pct+'% read':'Not started'}</div></div></div>`;
  }).join('');
}
function filterBooks(){const q=document.getElementById('search-input').value.toLowerCase();renderBooks(q?allBooks.filter(b=>b.name.toLowerCase().includes(q)):allBooks);}
async function refreshLibrary(){allBooks=await listBooks();progress=await loadProgress();renderBooks(allBooks);}
function initDragDrop(){
  const z=document.getElementById('upload-zone');
  z.addEventListener('dragover',e=>{e.preventDefault();z.classList.add('drag-over');});
  z.addEventListener('dragleave',()=>z.classList.remove('drag-over'));
  z.addEventListener('drop',e=>{e.preventDefault();z.classList.remove('drag-over');const files=Array.from(e.dataTransfer.files).filter(f=>f.name.match(/\.(epub|pdf)$/i));if(files.length){const dt=new DataTransfer();files.forEach(f=>dt.items.add(f));const inp=document.getElementById('file-input');inp.files=dt.files;uploadBooks({target:inp});}});
}

// ── READER OPEN/CLOSE ───────────────────────────────────────
async function openBook(fileId,type,name){
  currentBook={fileId,type,name};
  document.getElementById('app').style.display='none';
  document.getElementById('reader-screen').style.display='block';
  document.getElementById('chrome-title').textContent=name;
  document.getElementById('page-viewport').style.display='block';
  document.getElementById('pdf-area').style.display='none';
  document.getElementById('page-canvas').innerHTML='<div class="loading" style="height:100vh"><div class="spinner"></div><p>Loading book…</p></div>';
  const data=await downloadFile(fileId);
  type==='EPUB'?await openEpub(data):await openPdf(data);
}

function closeReader(){
  document.getElementById('reader-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  hideChrome();pages=[];currentSpread=0;totalSpreads=0;epubRawHtml='';
  document.getElementById('page-canvas').innerHTML='';
  currentBook=null;
}

// ── EPUB PARSER ─────────────────────────────────────────────
async function openEpub(data){
  try{
    const zip=await JSZip.loadAsync(data);
    const parser=new DOMParser();
    const opfPath=parser.parseFromString(await zip.file('META-INF/container.xml').async('string'),'application/xml').querySelector('rootfile').getAttribute('full-path');
    const opfDir=opfPath.includes('/')?opfPath.substring(0,opfPath.lastIndexOf('/')+1):'';
    const opfDoc=parser.parseFromString(await zip.file(opfPath).async('string'),'application/xml');
    const manifest={};
    opfDoc.querySelectorAll('manifest item').forEach(el=>manifest[el.getAttribute('id')]={href:el.getAttribute('href'),type:el.getAttribute('media-type')});
    const spineIds=Array.from(opfDoc.querySelectorAll('spine itemref')).map(el=>el.getAttribute('idref'));
    let combined='';
    for(const id of spineIds){
      if(!manifest[id])continue;
      const href=opfDir+manifest[id].href;
      const file=zip.file(href)||zip.file(decodeURIComponent(href));
      if(!file)continue;
      let html=await file.async('string');
      // Inline images
      for(const m of[...html.matchAll(/src=["']([^"'#?]+)["']/g)]){
        const imgPath=m[1].startsWith('/')?m[1].slice(1):opfDir+m[1];
        const imgFile=zip.file(imgPath)||zip.file(decodeURIComponent(imgPath));
        if(imgFile){const b64=await imgFile.async('base64');const ext=m[1].split('.').pop().toLowerCase();const mime={jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',svg:'image/svg+xml',webp:'image/webp'}[ext]||'image/png';html=html.replace(m[0],`src="data:${mime};base64,${b64}"`);}
      }
      const doc=parser.parseFromString(html,'text/html');
      doc.querySelectorAll('script,style,link,nav,head').forEach(el=>el.remove());
      doc.querySelectorAll('a').forEach(a=>{if(/^\s*\d+\s*$/.test(a.textContent)){a.remove();return;}a.removeAttribute('href');});
      combined+=(doc.body?.innerHTML||html);
    }
    epubRawHtml=combined;
    await paginateAndRender();
    const saved=progress[currentBook.fileId]||{};
    goToSpread(saved.spread||0,false);
    showChrome();
  }catch(e){
    console.error(e);
    document.getElementById('page-canvas').innerHTML=`<div class="loading" style="height:100vh"><p>⚠️ Could not load EPUB.<br>May be DRM protected.</p></div>`;
  }
}

// ── PAGINATION ENGINE ────────────────────────────────────────
// Splits raw HTML into pages that exactly fit the visible area
// by measuring text in a hidden off-screen div.
async function paginateAndRender(){
  isMobile=window.innerWidth<=700;
  const vp=document.getElementById('page-viewport');
  const W=vp.clientWidth, H=vp.clientHeight;
  const pageW=isMobile?W:Math.floor(W/2);
  const padV=32, padH_val=isMobile?22:52;
  const textW=pageW-padH_val*2;
  const textH=H-padV*2-20; // leave room for pill

  // Set up measure div
  const mDiv=document.getElementById('measure-div');
  mDiv.style.cssText=`width:${textW}px;font-size:${fontSize}px;line-height:1.85;font-family:Georgia,serif;color:#1e1810;`;

  // Parse HTML into element array
  const temp=document.createElement('div');
  temp.innerHTML=epubRawHtml;
  const children=Array.from(temp.children);

  pages=[];
  let pageNodes=[];
  let pageHeight=0;

  const flushPage=()=>{
    if(pageNodes.length){
      pages.push(pageNodes.map(n=>n.outerHTML||n.textContent).join(''));
      pageNodes=[];pageHeight=0;
    }
  };

  for(let i=0;i<children.length;i++){
    const node=children[i];
    mDiv.innerHTML=node.outerHTML;
    const nodeH=mDiv.scrollHeight;

    if(nodeH>textH){
      // Big node — split into word-chunks
      flushPage();
      const words=node.textContent.split(' ').filter(w=>w);
      const tag=node.tagName.toLowerCase();
      let lo=0;
      while(lo<words.length){
        let hi=words.length;
        let fit=lo+1;
        // Binary search for how many words fit
        let left2=lo,right2=hi;
        while(left2<right2-1){
          const mid=(left2+right2)>>1;
          mDiv.innerHTML=`<${tag}>${words.slice(lo,mid).join(' ')}</${tag}>`;
          if(mDiv.scrollHeight<=textH)left2=mid;else right2=mid;
        }
        fit=Math.max(lo+1,left2);
        pages.push(`<${tag}>${words.slice(lo,fit).join(' ')}</${tag}>`);
        lo=fit;
      }
    } else if(pageHeight+nodeH<=textH){
      pageNodes.push(node);pageHeight+=nodeH;
    } else {
      flushPage();
      pageNodes.push(node);pageHeight=nodeH;
    }
    // Yield every 50 nodes
    if(i%50===0)await new Promise(r=>setTimeout(r,0));
  }
  flushPage();
  mDiv.innerHTML='';

  totalSpreads=isMobile?pages.length:Math.ceil(pages.length/2);
  buildPageDOM(pageW,H,padV,padH_val);
}

function buildPageDOM(pageW,H,padV,padH_val){
  const canvas=document.getElementById('page-canvas');
  const vpW=document.getElementById('page-viewport').clientWidth;
  canvas.innerHTML='';
  canvas.style.cssText=`top:0;left:0;bottom:0;display:flex;transition:none;`;
  document.getElementById('page-divider').style.display=isMobile?'none':'block';

  for(let s=0;s<totalSpreads;s++){
    const spread=document.createElement('div');
    spread.className='spread';
    spread.style.cssText=`width:${vpW}px;height:${H}px;flex-shrink:0;`;

    if(isMobile){
      const page=document.createElement('div');
      page.className='page';
      page.style.cssText=`width:${pageW}px;height:${H}px;`;
      const inner=document.createElement('div');
      inner.className='page-inner';
      inner.style.cssText=`padding:${padV}px ${padH_val}px;font-size:${fontSize}px;`;
      inner.innerHTML=pages[s]||'';
      page.appendChild(inner);spread.appendChild(page);
    } else {
      // Left page
      const lp=document.createElement('div');
      lp.className='page';lp.style.cssText=`width:${pageW}px;height:${H}px;`;
      const li=document.createElement('div');
      li.className='page-inner';li.style.cssText=`padding:${padV}px ${padH_val}px;font-size:${fontSize}px;`;
      li.innerHTML=pages[s*2]||'';
      lp.appendChild(li);spread.appendChild(lp);
      // Right page
      const rp=document.createElement('div');
      rp.className='page';rp.style.cssText=`width:${pageW}px;height:${H}px;`;
      const ri=document.createElement('div');
      ri.className='page-inner';ri.style.cssText=`padding:${padV}px ${padH_val}px;font-size:${fontSize}px;`;
      ri.innerHTML=pages[s*2+1]||'';
      rp.appendChild(ri);spread.appendChild(rp);
    }
    canvas.appendChild(spread);
  }
}

// ── NAVIGATION ──────────────────────────────────────────────
function goToSpread(n,animate=true){
  n=Math.max(0,Math.min(n,Math.max(0,totalSpreads-1)));
  currentSpread=n;
  const vpW=document.getElementById('page-viewport').clientWidth;
  const canvas=document.getElementById('page-canvas');
  canvas.style.transition=animate?'transform 0.32s cubic-bezier(0.4,0,0.2,1)':'none';
  canvas.style.transform=`translateX(${-n*vpW}px)`;
  updateUI();
  saveEpubProgress();
}

function nextPage(){if(currentSpread<totalSpreads-1)goToSpread(currentSpread+1);else showToast('End of book 🎉');}
function prevPage(){if(currentSpread>0)goToSpread(currentSpread-1);else showToast('Beginning of book');}

function updateUI(){
  const lp=isMobile?currentSpread+1:currentSpread*2+1;
  const rp=isMobile?lp:lp+1;
  const total=pages.length;
  const label=isMobile?`${lp} / ${total}`:`${lp}–${Math.min(rp,total)} / ${total}`;
  document.getElementById('page-pill').textContent=label;
  document.getElementById('scrubber-label').textContent=label;
  const pct=totalSpreads>1?(currentSpread/(totalSpreads-1))*100:100;
  document.getElementById('scrubber-fill').style.width=pct.toFixed(1)+'%';
}

function scrubberClick(e){
  const rect=e.currentTarget.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  goToSpread(Math.round(pct*(totalSpreads-1)));
}

async function saveEpubProgress(){
  if(!currentBook)return;
  const pct=totalSpreads>1?Math.round((currentSpread/(totalSpreads-1))*100):100;
  progress[currentBook.fileId]={spread:currentSpread,percent:pct,type:'epub'};
  renderBooks(allBooks);
  await saveProgress();
}

// ── CHROME ──────────────────────────────────────────────────
function showChrome(){chromeVisible=true;document.getElementById('chrome-top').classList.add('show');document.getElementById('chrome-bottom').classList.add('show');clearTimeout(chromeTimer);chromeTimer=setTimeout(hideChrome,4000);}
function hideChrome(){chromeVisible=false;document.getElementById('chrome-top').classList.remove('show');document.getElementById('chrome-bottom').classList.remove('show');}
function toggleChrome(){chromeVisible?hideChrome():showChrome();}

// ── FONT SIZE ───────────────────────────────────────────────
async function changeFontSize(d){
  fontSize=Math.max(13,Math.min(26,fontSize+d));
  if(currentBook?.type==='EPUB'&&epubRawHtml){
    showToast('Repaginating…');
    const s=currentSpread;
    await paginateAndRender();
    goToSpread(Math.min(s,totalSpreads-1),false);
  }
}

// ── KEYBOARD ────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(!currentBook)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')currentBook.type==='PDF'?pdfNext():nextPage();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')currentBook.type==='PDF'?pdfPrev():prevPage();
  if(e.key==='Escape')closeReader();
});

// ── RESIZE ──────────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(async()=>{
    if(currentBook?.type==='EPUB'&&epubRawHtml){
      const s=currentSpread;
      await paginateAndRender();
      goToSpread(Math.min(s,totalSpreads-1),false);
    }
    if(currentBook?.type==='PDF')renderPdfPage(pdfCurrentPage);
  },350);
});

// ── PDF ─────────────────────────────────────────────────────
async function openPdf(data){
  document.getElementById('page-viewport').style.display='none';
  const area=document.getElementById('pdf-area');
  area.style.display='flex';
  area.innerHTML='<div class="loading"><div class="spinner"></div><p>Loading PDF…</p></div>';
  pdfDoc=await pdfjsLib.getDocument({data}).promise;
  const saved=progress[currentBook.fileId]||{};
  pdfCurrentPage=saved.page||1;
  if(pdfCurrentPage>pdfDoc.numPages)pdfCurrentPage=1;
  await renderPdfPage(pdfCurrentPage);
  showChrome();
}

async function renderPdfPage(n){
  const area=document.getElementById('pdf-area');
  area.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const page=await pdfDoc.getPage(n);
  const vp0=page.getViewport({scale:1});
  const scale=Math.min((window.innerWidth-40)/vp0.width,(window.innerHeight-40)/vp0.height,2.5);
  const vp=page.getViewport({scale});
  const canvas=document.createElement('canvas');
  canvas.width=vp.width;canvas.height=vp.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  area.innerHTML='';area.appendChild(canvas);
  area.onclick=e=>{const x=e.clientX,W=window.innerWidth;if(x<W*0.28)pdfPrev();else if(x>W*0.72)pdfNext();else toggleChrome();};
  const pct=Math.round((n/pdfDoc.numPages)*100);
  document.getElementById('page-pill').textContent=`${n} / ${pdfDoc.numPages}`;
  document.getElementById('scrubber-label').textContent=`${n} / ${pdfDoc.numPages}`;
  document.getElementById('scrubber-fill').style.width=pct+'%';
  progress[currentBook.fileId]={page:n,percent:pct,type:'pdf'};
  await saveProgress();
}

async function pdfNext(){if(pdfCurrentPage<pdfDoc.numPages){pdfCurrentPage++;await renderPdfPage(pdfCurrentPage);}else showToast('Last page 🎉');}
async function pdfPrev(){if(pdfCurrentPage>1){pdfCurrentPage--;await renderPdfPage(pdfCurrentPage);}else showToast('First page');}

// ── TOAST ───────────────────────────────────────────────────
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

// ── INIT ────────────────────────────────────────────────────
async function init(){
  if(loadSavedToken()&&await verifyToken()){
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    folderId=await getOrCreateFolder();
    await refreshLibrary();
    initDragDrop();
  }else{
    document.getElementById('auth-screen').style.display='flex';
  }
}
init();
</script>
